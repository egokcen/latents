name: Feature Request
description: Suggest an idea for latents
title: "[ENH] "
labels: [enhancement]

body:
  - type: checkboxes
    id: checks
    attributes:
      label: Feature Type
      description: Please check what type of feature request you would like to propose.
      options:
        - label: >
            Adding new functionality to latents
        - label: >
            Changing existing functionality in latents
        - label: >
            Removing existing functionality in latents
  - type: textarea
    id: problem-description
    attributes:
      label: Problem Description
      description: >
        Please describe what problem the feature would solve."
    validations:
      required: true
  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: >
        Please describe how the new feature would be implemented, using pseudocode if 
        relevant.
    validations:
      required: true
  - type: textarea
    id: alternative
    attributes:
      label: Alternative Solutions
      description: >
        Please describe any alternative solution (existing functionality,
        3rd party package, etc.) that would satisfy the feature request.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: >
        Please provide any relevant GitHub issues, code examples, or references that
        help describe and support the feature request.
  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: Code of Conduct
      description: >
        By submitting this issue, you agree to follow our 
        [Code of Conduct](../CODE_OF_CONDUCT.md). 
      options:
        - label: I agree to follow the Latents Code of Conduct
          required: true