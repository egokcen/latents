name: Installation Issue
description: Report issues installing the latents package on your system
title: "[BUILD] "
labels: [build, needs-triage]

body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: >
            I have read the
            [installation guide](https://latents.readthedocs.io/stable/getting_started/).
          required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: >
        Provide the output of `python -c "import platform; print(platform.platform())"`.
    validations:
      required: true

  - type: dropdown
    id: installation-method
    attributes:
      label: Installation Method
      description: >
        Indicate how you tried to install latents from a clean environment.
      options:
        - pip install
        - uv add
        - Built from source
        - Other
    validations:
      required: true

  - type: input
    id: latents-version
    attributes:
      label: Latents Version
      description: >
        Provide the version of latents that you are trying to install.
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python Version
      description: Python version you are using
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - "3.14"
        - Other (specify in logs below)
    validations:
      required: true

  - type: textarea
    id: installation-logs
    attributes:
      label: Installation Logs
      description: >
        Copy and paste the installation logs when attempting to install latents.
      placeholder: |
        Paste installation output here...
      render: shell
    validations:
      required: true
