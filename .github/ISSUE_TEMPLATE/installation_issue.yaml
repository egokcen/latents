name: Installation Issue
description: Report issues installing the latents package on your system
title: "[BUILD] "
labels: [build]

body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: >
            I have read the 
            [installation guide](https://github.com/egokcen/latents/blob/main/README.md#getting-started).
          required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: >
        Please provide the output of ``import platform; print(platform.platform())``.
    validations:
      required: true
  - type: dropdown
    id: installation-method
    attributes:
      label: Installation Method
      description: >
        Please indicate how you tried to install latents from a clean environment.
      options:
        - pip install
        - conda install
        - Built from source
        - Other
    validations:
      required: true
  - type: input
    id: latents-version
    attributes:
      label: latents Version
      description: >
        Please provide the version of latents that you are trying to install.
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: >
        Please provide the installed version of Python.
    validations:
      required: true
  - type: textarea
    id: installation-logs
    attributes:
      label: Installation Logs
      description: >
        If possible, please copy and paste the installation logs when attempting to 
        install latents.
      value: >
        <details>


        Replace this line with the installation logs.


        </details>