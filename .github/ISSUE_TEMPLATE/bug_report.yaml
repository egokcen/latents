name: Bug Report
description: Report incorrect behavior in the latents package
title: "[BUG] "
labels: [bug]

body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: >
            I have checked that this issue has not already been reported.
          required: true
  - type: input
    id: latents-version
    attributes:
      label: latents Version
      description: >
        Please provide the installed version of latents.
    validations:
      required: true
  - type: textarea
    id: reproducible-example
    attributes:
      label: Reproducible Example
      description: >
        Please provide a minimal, copy-pastable example.
      placeholder: >
        from latents.mdlag import mDLAGModel

        model = mDLAGModel()

        ...
      render: python
    validations:
      required: true
  - type: textarea
    id: issue-description
    attributes:
      label: Issue Description
      description: >
        Please provide a description of the issue shown in the reproducible example.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: >
        Please describe or show a code example of the expected behavior.
    validations:
      required: true