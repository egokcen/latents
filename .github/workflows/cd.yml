name: CD

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Run CI first to ensure everything passes
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build:
    name: Build Package
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/latents/
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          # Get version from tag (strip leading 'v')
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract section between this version's header and the next section
          # Stops at: next version header (## [) or link references ([X]: http...)
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^\(## \[\|^\[.\+\]:\)/p" CHANGELOG.md | sed '1d;$d')

          if [ -z "$NOTES" ]; then
            echo "::warning::No CHANGELOG entry found for version ${VERSION}"
            NOTES="Release ${VERSION}"
          fi

          # Write to GitHub output using heredoc delimiter
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
