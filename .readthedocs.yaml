version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    # Install uv via asdf (ReadTheDocs recommended approach)
    pre_create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    # Create venv in RTD's expected location
    create_environment:
      - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
    # Unshallow clone so hatch-vcs can detect version from git tags
    post_checkout:
      - git fetch --unshallow || true
    # Install project with doc dependencies using PEP 735 dependency group
    install:
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --frozen --group doc

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true
